[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/inscricao"
  to = "/inscricao.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
